# ============================================================
# docker-compose.yml - Orchestration de l'application
# ============================================================
# Lancement : docker-compose up -d
# Arrêt     : docker-compose down
# Rebuild   : docker-compose up -d --build
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gwl-app
    ports:
      - "8501:8501"
    volumes:
      # Persistance des données et modèles entre redémarrages
      - ./data:/app/data
      - ./models:/app/models
      # Persistance de la configuration d'authentification
      - ./app/config.yaml:/app/app/config.yaml
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
