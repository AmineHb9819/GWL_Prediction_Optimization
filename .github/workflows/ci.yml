# ============================================================
# CI - Intégration continue (GitHub Actions)
# ============================================================
# Déclenché sur push et pull request vers main.
# Vérifie que l'application se construit correctement.
# ============================================================

name: CI — Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Installer Python
      - name: Installer Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # 3. Cache des dépendances pip
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # 4. Installer les dépendances
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      # 5. Lint — vérification syntaxique (erreurs critiques uniquement)
      - name: Lint (flake8 - erreurs critiques)
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      # 6. Vérifier que les imports fonctionnent
      - name: Vérifier les imports
        run: |
          python -c "import streamlit; print(f'Streamlit {streamlit.__version__}')"
          python -c "import tensorflow; print(f'TensorFlow {tensorflow.__version__}')"
          python -c "import sklearn; print(f'Scikit-learn {sklearn.__version__}')"
          python -c "import deap; print('DEAP OK')"
          python -c "import networkx; print(f'NetworkX {networkx.__version__}')"
          python -c "import streamlit_authenticator; print('Auth OK')"

      # 7. Vérifier le build Docker
      - name: Build Docker
        run: |
          docker build -t gwl-app-test .
